name: Build

on:
  workflow_run:
    workflows:
      - Test
    types:
      - completed

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Trigger release for version-bump commits
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        shell: bash
        env:
          WORKFLOW_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          commit_subject="$(git log -1 --format=%s "$RELEASE_SHA")"
          if [[ "$commit_subject" != "chore(release): bump version to "* ]]; then
            echo "Normal main commit; Release workflow not triggered."
            exit 0
          fi

          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $WORKFLOW_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/release.yml/dispatches" \
            --data "{\"ref\":\"main\",\"inputs\":{\"target_sha\":\"$RELEASE_SHA\"}}"
